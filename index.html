<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Countdown to the June Moment</title>
<meta name="description" content="Countdown to the June Moment. June 11, 2026 at 12:00 PM ET. Times Center, New York.">
<meta name="robots" content="noindex">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding: 2rem 1.5rem;
  }
  .card {
    width: 100%;
    max-width: 640px;
    text-align: center;
  }
  .clock {
    display: grid;
    grid-template-columns: repeat(4, minmax(3rem, 1fr));
    max-width: 26rem;
    margin: 0 auto 1.5rem;
    column-gap: 0.75rem;
    row-gap: 0.5rem;
  }
  .value {
    font-size: clamp(2.5rem, 8vw, 5rem);
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: #ffffff;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #9a9a9a;
    text-align: center;
  }
  .sub {
    color: #c8c8c8;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .eyebrow {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #9a9a9a;
    margin-bottom: 0.5rem;
  }
  .live .headline {
    font-size: clamp(1.75rem, 5.5vw, 2.75rem);
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #ffffff;
    margin: 0 0 1rem;
  }
  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }
</style>
</head>
<body>
<main class="card">
  <section id="countdown" aria-label="Countdown to the June Moment">
    <div class="clock" aria-hidden="true">
      <span class="value" id="d">--</span>
      <span class="value" id="h">--</span>
      <span class="value" id="m">--</span>
      <span class="value" id="s">--</span>
      <span class="label">Days</span>
      <span class="label">Hrs</span>
      <span class="label">Min</span>
      <span class="label">Sec</span>
    </div>
    <div class="sub">
      <div class="eyebrow">until the June Moment</div>
      June 11, 2026 &middot; 12:00 PM ET<br>
      Times Center, New York
    </div>
  </section>
  <section id="live" class="live" hidden>
    <p class="headline">THE JUNE MOMENT IS NOW</p>
    <div class="sub">June 11, 2026 &middot; Times Center, New York</div>
  </section>
  <p id="sr" class="visually-hidden" aria-live="polite"></p>
</main>
<script>
(function () {
  var TARGET = new Date("2026-06-11T12:00:00-04:00").getTime();
  var d = document.getElementById("d");
  var h = document.getElementById("h");
  var m = document.getElementById("m");
  var s = document.getElementById("s");
  var countdown = document.getElementById("countdown");
  var live = document.getElementById("live");
  var sr = document.getElementById("sr");
  var announced = false;

  function pad(n) { return n < 10 ? "0" + n : "" + n; }

  function tick() {
    var diff = TARGET - Date.now();
    if (diff <= 0) {
      if (!countdown.hidden) {
        countdown.hidden = true;
        live.hidden = false;
      }
      if (!announced) {
        sr.textContent = "The June Moment is now live.";
        announced = true;
      }
      return;
    }
    var days = Math.floor(diff / 86400000);
    var hours = Math.floor((diff % 86400000) / 3600000);
    var minutes = Math.floor((diff % 3600000) / 60000);
    var seconds = Math.floor((diff % 60000) / 1000);
    d.textContent = pad(days);
    h.textContent = pad(hours);
    m.textContent = pad(minutes);
    s.textContent = pad(seconds);
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
